services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      DataJsonFile: /app/data/data.json
      Repository__Provider: LocalJson
    volumes:
      - ./data:/app/data:ro

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        API_BASE_URL: http://localhost:3000
    ports:
      - "3000:80"
    depends_on:
      - api
