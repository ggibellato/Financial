name: Financial build

on:
  push:
    branches: [ main ]  
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
    
jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal

  web-build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 24.13.0

    - name: Install dependencies
      working-directory: Financial.Web
      run: npm install

    - name: Lint
      working-directory: Financial.Web
      run: npm run lint

    - name: Run tests
      working-directory: Financial.Web
      run: npm test

    - name: Build
      working-directory: Financial.Web
      run: npm run build

  browser-smoke-test:
    needs: [ build-and-test, web-build-test ]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 24.13.0

    - name: Install web dependencies
      working-directory: Financial.Web
      run: npm install

    - name: Install Playwright browser
      working-directory: Financial.Web
      run: npx playwright install --with-deps chromium

    - name: Build web frontend
      working-directory: Financial.Web
      run: |
        echo "API_BASE_URL=/api/v1/financial" > .env
        npm run build

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Publish API
      run: dotnet publish Financial.Api/Financial.Api.csproj --configuration Release --output publish

    - name: Embed web build into API wwwroot
      run: |
        mkdir -p publish/wwwroot
        cp -r Financial.Web/dist/. publish/wwwroot/

    - name: Run browser smoke test
      env:
        DataJsonFile: ${{ github.workspace }}/Tests/Financial.Api.Tests/TestData/data.test.json
        ASPNETCORE_URLS: http://localhost:8080
        SMOKE_APP_URL: http://localhost:8080
      run: |
        cd publish
        dotnet Financial.Api.dll &
        API_PID=$!
        cd ..
        ready=0
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8080/api/v1/financial/health > /dev/null; then
            ready=1
            break
          fi
          sleep 1
        done
        if [ "$ready" -ne 1 ]; then
          echo "API did not become healthy in time"
          kill $API_PID
          exit 1
        fi
        node Financial.Web/scripts/smoke-test.mjs
        SMOKE_EXIT=$?
        kill $API_PID
        exit $SMOKE_EXIT
